name: Daily Digest

# Runs daily at 10:00 UTC, after arXiv's nightly indexing lag so the previous
# evening's submissions are searchable. workflow_dispatch remains available for
# verification runs, backfills, and targeted window replays.
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'ISO-8601 start of the window (e.g. 2026-04-22T00:00:00Z). Optional; default reads data/last_successful_run.json minus overlap.'
        required: false
      until:
        description: 'ISO-8601 end of the window. Optional; default is the runner time.'
        required: false
      dry_run:
        description: 'Set to "true" to skip writing the run log (verification runs).'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve GitHub App token input
        id: app_config
        env:
          DIGEST_APP_CLIENT_ID: ${{ vars.DIGEST_APP_CLIENT_ID }}
          DIGEST_APP_ID: ${{ vars.DIGEST_APP_ID }}
        run: |
          set -euo pipefail
          if [ -n "${DIGEST_APP_CLIENT_ID:-}" ]; then
            echo "::add-mask::$DIGEST_APP_CLIENT_ID"
            echo "mode=client-id" >> "$GITHUB_OUTPUT"
            echo "client_id=$DIGEST_APP_CLIENT_ID" >> "$GITHUB_OUTPUT"
          elif [ -n "${DIGEST_APP_ID:-}" ]; then
            echo "::add-mask::$DIGEST_APP_ID"
            echo "::warning title=Legacy GitHub App variable::Using vars.DIGEST_APP_ID with the deprecated app-id input. Rename the repository variable to DIGEST_APP_CLIENT_ID and store the GitHub App Client ID there."
            echo "mode=app-id" >> "$GITHUB_OUTPUT"
            echo "app_id=$DIGEST_APP_ID" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Missing GitHub App client ID::Set repository variable DIGEST_APP_CLIENT_ID to the GitHub App Client ID. During migration, vars.DIGEST_APP_ID is also accepted as a fallback."
            exit 1
          fi
      - uses: actions/create-github-app-token@v3
        id: app_token_client
        if: steps.app_config.outputs.mode == 'client-id'
        with:
          client-id: ${{ steps.app_config.outputs.client_id }}
          private-key: ${{ secrets.DIGEST_APP_PRIVATE_KEY }}
      - uses: actions/create-github-app-token@v3
        id: app_token_legacy
        if: steps.app_config.outputs.mode == 'app-id'
        with:
          app-id: ${{ steps.app_config.outputs.app_id }}
          private-key: ${{ secrets.DIGEST_APP_PRIVATE_KEY }}
      - name: Select GitHub App token
        id: app_token
        env:
          TOKEN_CLIENT: ${{ steps.app_token_client.outputs.token }}
          TOKEN_LEGACY: ${{ steps.app_token_legacy.outputs.token }}
          APP_SLUG_CLIENT: ${{ steps.app_token_client.outputs.app-slug }}
          APP_SLUG_LEGACY: ${{ steps.app_token_legacy.outputs.app-slug }}
        run: |
          set -euo pipefail
          token="${TOKEN_CLIENT:-${TOKEN_LEGACY:-}}"
          app_slug="${APP_SLUG_CLIENT:-${APP_SLUG_LEGACY:-}}"
          if [ -z "$token" ] || [ -z "$app_slug" ]; then
            echo "::error title=GitHub App token was not created::The token action did not return token/app-slug outputs."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "app-slug=$app_slug" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e .

      - name: Run daily pipeline
        # Inputs are passed via env to avoid ${{ }} expansion into the shell
        # script body (script-injection hardening).  The app token used by
        # this job can bypass `main` branch protection, so we treat the
        # dispatch surface as a privileged boundary even though only
        # repo-writers can dispatch today.
        env:
          LLM_PROVIDER: google
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_TRIAGE: gemma-4-31b-it
          GEMINI_MODEL_SUMMARY: gemma-4-31b-it
          INPUT_SINCE: ${{ inputs.since }}
          INPUT_UNTIL: ${{ inputs.until }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(--daily)
          if [ -n "${INPUT_SINCE:-}" ]; then
            args+=(--since "$INPUT_SINCE")
          fi
          if [ -n "${INPUT_UNTIL:-}" ]; then
            args+=(--until "$INPUT_UNTIL")
          fi
          if [ "${INPUT_DRY_RUN:-}" = "true" ]; then
            args+=(--dry-run)
          fi
          python -m eegfm_digest.run "${args[@]}"

      - name: Commit outputs (first commit)
        # Outputs land first.  If this succeeds but the run-log commit below
        # fails for any reason, tomorrow's run will redo the same window and
        # dedupe via SQLite cache -- self-healing.
        #
        # We commit the rendered site (docs/) and the triage/summary cache
        # (data/digest.sqlite).  outputs/ stays gitignored: it holds per-month
        # raw JSONL dumps plus PDFs/text that would bloat git history and are
        # reproducible from the DB + arXiv + LLM.  The -A flag on specific
        # pathspecs picks up creations/modifications/deletions without
        # erroring when a path does not yet exist on a fresh checkout.
        id: commit_outputs
        run: |
          set -euo pipefail
          git config user.name "eeg-fm-daily-digest[bot]"
          git config user.email "${{ steps.app_token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add -A docs/ data/digest.sqlite
          if git diff --staged --quiet; then
            echo "no_output_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto: daily digest outputs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "no_output_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit run log (second commit)
        # The run log advances only if the pipeline succeeded (i.e. step
        # "Run daily pipeline" did not fail).  GitHub Actions skips later
        # steps on earlier failure unless explicitly marked with
        # if: always(), which this step is not -- so the contract holds.
        run: |
          set -euo pipefail
          git add data/last_successful_run.json || true
          if git diff --staged --quiet; then
            echo "no run-log change (dry-run or nothing to update)"
          else
            git commit -m "auto: advance daily run log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

      - name: Push
        run: |
          set -euo pipefail
          git push
